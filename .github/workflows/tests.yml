name: Quality Checks

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Run ruff
        run: |
          mkdir -p lint-results
          uv run ruff check src tests | tee lint-results/ruff.txt

      - name: Build lint summary
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path

          ruff_output = Path("lint-results/ruff.txt")
          summary_path = Path("lint-results/pr-summary.md")
          summary_lines = ["## Ruff Results", ""]

          if ruff_output.exists():
              output = ruff_output.read_text().strip()
              if output:
                  summary_lines.extend(
                      [
                          "- Status: issues found",
                          "",
                          "```text",
                          output,
                          "```",
                          "",
                      ]
                  )
              else:
                  summary_lines.append("- Status: clean\n")

          summary = "\n".join(summary_lines).strip() + "\n"
          summary_path.write_text(summary)
          github_summary = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          with github_summary.open("a") as f:
              f.write(summary)
          PY

      - name: Upload lint artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: lint-results/

      - name: Comment lint summary on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'lint-results/pr-summary.md';
            const marker = '<!-- lint-summary -->';
            const body = `${marker}\n${fs.readFileSync(path, 'utf8')}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Run tests with coverage
        run: |
          mkdir -p test-results
          uv run pytest \
            --junitxml=test-results/pytest.xml \
            --cov=argo_interp \
            --cov-report=term-missing \
            --cov-report=xml:test-results/coverage.xml

      - name: Build PR summary
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          pytest_xml = Path("test-results/pytest.xml")
          coverage_xml = Path("test-results/coverage.xml")
          summary_path = Path("test-results/pr-summary.md")

          summary_lines = ["## Pytest Results", ""]

          if pytest_xml.exists():
              suite = ET.parse(pytest_xml).getroot()
              if suite.tag == "testsuites":
                  suite = suite.find("testsuite")
              tests = int(suite.attrib.get("tests", 0))
              failures = int(suite.attrib.get("failures", 0))
              errors = int(suite.attrib.get("errors", 0))
              skipped = int(suite.attrib.get("skipped", 0))
              time = float(suite.attrib.get("time", 0.0))
              passed = tests - failures - errors - skipped
              summary_lines.extend(
                  [
                      f"- Passed: {passed}",
                      f"- Failed: {failures}",
                      f"- Errors: {errors}",
                      f"- Skipped: {skipped}",
                      f"- Total: {tests}",
                      f"- Runtime: {time:.2f}s",
                      "",
                  ]
              )

          if coverage_xml.exists():
              coverage_root = ET.parse(coverage_xml).getroot()
              line_rate = float(coverage_root.attrib.get("line-rate", 0.0)) * 100.0
              summary_lines.extend(
                  [
                      "## Coverage",
                      "",
                      f"- Line coverage: {line_rate:.2f}%",
                      "",
                  ]
              )

          summary = "\n".join(summary_lines).strip() + "\n"
          summary_path.write_text(summary)
          github_summary = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          with github_summary.open("a") as f:
              f.write(summary)
          PY

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: test-results/

      - name: Comment test summary on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'test-results/pr-summary.md';
            const marker = '<!-- pytest-summary -->';
            const body = `${marker}\n${fs.readFileSync(path, 'utf8')}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
