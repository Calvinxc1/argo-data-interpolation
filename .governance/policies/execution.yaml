id: execution
when: [edit, command]
state:
  preflight: one_time_per_discussion
rules:
  - Use `uv` as the repository's development environment and command runner.
  - Require a separate explicit execution cue before changing files after proposal or question discussion.
  - If proposal or question discussion occurred and preflight has not yet been sent for that discussion, send only `Execution confirmation required. No changes made yet.` and make no changes.
  - If preflight has already been sent for that discussion and a later explicit execution cue is received, execute without another confirmation unless requirements changed materially or became ambiguous.
  - If intent is ambiguous, ask a short clarifying question before acting.
  - Default to read-only discussion and planning until explicitly directed otherwise.
  - In review prompts that mention related artifacts, treat the extra artifacts as review-only unless separately authorized for edits.
  - Overrides may relax other eligible constraints, but never the requirement for explicit execution authorization.
