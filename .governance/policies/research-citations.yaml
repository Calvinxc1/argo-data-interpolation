id: research_citations
when: [research_citations]
rules:
  - Lit reviews are source-backed synthesis; notes allow framed interpretation and hypotheses; notebooks allow prototype-specific commentary tied to actual work.
  - Do not force lit reviews, notes, and notebooks into the same voice.
  - Verify source-backed claims against original articles when full text is available.
  - Prefer local research sources copies over web summaries for verification and page references.
  - Add page numbers only after full-text verification.
  - If full text is unavailable, mark the citation or section as pending full-text review.
  - Treat DOI mismatches as hard citation errors and fix citation metadata and in-text references together.
  - Do not broaden narrow source support into broader claims unless framed as inference.
  - Within a topic folder, literature-review.md is the canonical source-backed artifact.
  - Source-backed claims in topic notes and notebooks must trace to sources already covered in that topic literature review.
  - If notes or notebooks need new source-backed support not yet represented in the literature review, update the literature review first or in the same change.
  - Candidate future sources may be noted only when clearly framed as pending source acquisition or pending literature-review inclusion.
