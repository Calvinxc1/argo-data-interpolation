purpose: "Record material, temporary policy overrides and their restoration status."

files:
  log: ".governance/policy-overrides.yaml"
  governance_readme: ".governance/README.md"

entry_model:
  collection_key: "overrides"
  amendment_rule: "Amend the existing entry for the same override case instead of creating layered overrides."
  pattern_review_rule: "After restoration, check prior entries for materially similar overrides and surface recurring patterns to the developer."

material_override_definition:
  summary: "An override is material when it bypasses a meaningful safeguard, changes normal review or execution expectations, affects persistent repository or workflow state, or would matter during later policy review."
  examples:
    - "temporarily bypassing branch protection or required checks"
    - "changing normal review expectations for a high-risk operation"
    - "bypassing a workflow safeguard that requires later restoration"
  non_examples:
    - "minor wording differences in a proposal that do not change execution or review posture"
    - "routine execution performed under normal policy without a bypass"

required_fields:
  - "id"
  - "date"
  - "operation"
  - "policy_sections"
  - "reason"
  - "exception"
  - "restoration_status"
  - "notes"

optional_fields:
  - "branch"
  - "pr"
  - "declared_by"
  - "scope"
  - "materiality"
  - "follow_up"

field_definitions:
  id: "Stable identifier for the override case."
  date: "Date the override was declared or most recently amended, in YYYY-MM-DD format."
  operation: "Concrete operation supported by the override. This should be narrow enough to have a clear completion point."
  policy_sections: "List of AGENTS.md sections being bypassed for this case."
  reason: "Immediate rationale for the exception."
  exception: "Short description of what was bypassed."
  restoration_status: "Current restoration state for any bypassed safeguard or policy-dependent state."
  notes: "Freeform context for deviations, restoration complications, or pattern-review observations."
  branch: "Branch associated with the override, if applicable."
  pr: "Pull request reference, if applicable."
  declared_by: "Who declared the override."
  scope: "Short description of case scope."
  materiality: "Optional materiality label such as material."
  follow_up: "Optional follow-up action, including policy-review triggers."

restoration_status_values:
  - "not_started"
  - "in_progress"
  - "restored"
  - "blocked"

entry_conventions:
  - "An override remains active until the supported operation is complete and restoration_status is restored."
  - "If restoration cannot be completed immediately, use blocked or in_progress and explain the condition in notes."
  - "Do not use one override entry to supersede override-governance rules."
  - "When an override changes mid-stream, amend the existing entry for that case."

example:
  overrides:
    - id: "2026-03-25-example-001"
      date: "2026-03-25"
      operation: "Temporarily disable branch protection to perform a one-off maintenance push, then restore protection."
      policy_sections:
        - "1.2"
        - "3.1"
      branch: "feature/agents-user-involvement-guardrails"
      declared_by: "developer"
      scope: "single operation"
      reason: "Required to complete exceptional maintenance that cannot proceed under the normal protection state."
      exception: "Temporary bypass of branch protection for a single push."
      materiality: "material"
      restoration_status: "restored"
      follow_up: "Review policy if similar maintenance bypasses recur."
      notes: "Restoration completed after the operation. No recurring pattern identified at the time of review."
